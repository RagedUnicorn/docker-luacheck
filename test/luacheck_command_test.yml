schemaVersion: 2.0.0

commandTests:
  - name: 'Test linting a simple Lua file'
    setup: [
      ['sh', '-c', 'echo "print(\"Hello World\")" > /tmp/test.lua']
    ]
    command: 'luacheck'
    args: ['--no-color', '/tmp/test.lua']
    exitCode: 0
    expectedOutput:
      - 'OK'
      - 'Total: 0 warnings / 0 errors'

  - name: 'Test detecting unused variable'
    setup: [
      ['sh', '-c', 'echo "local unused = 42" > /tmp/unused.lua']
    ]
    command: 'luacheck'
    args: ['--no-color', '/tmp/unused.lua']
    exitCode: 1
    expectedOutput:
      - 'unused'
      - 'warning'

  - name: 'Test with no-unused flag'
    setup: [
      ['sh', '-c', 'echo "local unused = 42" > /tmp/nounused.lua']
    ]
    command: 'luacheck'
    args: ['--no-color', '--no-unused', '/tmp/nounused.lua']
    exitCode: 0
    expectedOutput:
      - 'OK'
      - '0 warnings / 0 errors'

  - name: 'Test JUnit formatter'
    setup: [
      ['sh', '-c', 'echo "print(\"test\")" > /tmp/junit_test.lua']
    ]
    command: 'luacheck'
    args: ['--formatter', 'JUnit', '/tmp/junit_test.lua']
    exitCode: 0
    expectedOutput:
      - 'xml'
      - 'testsuite'

  - name: 'Test multiple files'
    setup: [
      ['sh', '-c', 'echo "print(1)" > /tmp/file1.lua'],
      ['sh', '-c', 'echo "print(2)" > /tmp/file2.lua']
    ]
    command: 'luacheck'
    args: ['--no-color', '/tmp/file1.lua', '/tmp/file2.lua']
    exitCode: 0
    expectedOutput:
      - 'file1.lua'
      - 'file2.lua'

  - name: 'Test parallel checking with -j flag (requires lanes)'
    setup: [
      ['sh', '-c', 'echo "print(1)" > /tmp/p1.lua'],
      ['sh', '-c', 'echo "print(2)" > /tmp/p2.lua'],
      ['sh', '-c', 'echo "print(3)" > /tmp/p3.lua'],
      ['sh', '-c', 'echo "print(4)" > /tmp/p4.lua']
    ]
    command: 'luacheck'
    args: ['--no-color', '-j', '2', '/tmp/p1.lua', '/tmp/p2.lua', '/tmp/p3.lua', '/tmp/p4.lua']
    exitCode: 0
    expectedOutput:
      - 'Total: 0 warnings / 0 errors'
    excludedOutput:
      - 'lanes'
